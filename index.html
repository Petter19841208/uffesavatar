<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Uffes AI-assistent</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #003366;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 18px;
    }

    video {
      width: 450px;
      max-width: 95%;
      border-radius: 16px;
      background: black;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .buttons {
      max-width: 900px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }

    button {
      background: white;
      color: #003366;
      border: none;
      border-radius: 14px;
      padding: 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-3px);
      background: #0078d4;
      color: white;
    }
  </style>
</head>

<body>

  <h1>Uffes AI-assistent</h1>

  <p class="subtitle">
    Har du en fråga? Klicka på en ruta nedan.
  </p>

  <video id="avatarVideo" controls preload="auto">
    <source src="uffe5.mp4" type="video/mp4">
    Din webbläsare stödjer inte video.
  </video>

  <div class="buttons">
    <button onclick="spela()">Får jag göra precis som jag vill?</button>
    <button onclick="spela()">Hur får jag spara mina dokument?</button>
    <button onclick="spela()">Får jag skicka sekretessbelagda dokument i Outlook?</button>
    <button onclick="spela()">Jag är osäker på hur jag ska hantera min information – vad gör jag?</button>
    <button onclick="spela()">Får jag använda privata USB-minnen i arbetet?</button>
    <button onclick="spela()">Hur ser vi till att ha en säker och trygg verksamhet?</button>
    <button onclick="spela()">Vad är svaret på de flesta frågor på den här sidan?</button>
    <button onclick="spela()">Vilket pålägg ska jag ha på min macka?</button>
    <button onclick="spela()">Min favoritfärg är lila, hur gör jag då?</button>
    
  </div>

  <script>
    function spela() {
      const video = document.getElementById("avatarVideo");
      video.currentTime = 0;
      video.play();
    }
  </script>

</body>
</html>
